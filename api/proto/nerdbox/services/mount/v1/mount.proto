syntax = "proto3";

package containerd.vminitd.services.mount.v1;

option go_package = "github.com/containerd/nerdbox/api/services/mount/v1;mount";

service Mount {
	rpc MountAll(MountAllRequest) returns (MountAllResponse);
	rpc Unmount(UnmountRequest) returns (UnmountResponse);
}

message MountSpec {
	string type             = 1;
	string source           = 2; // in-VM path or virtiofs tag
	string target           = 3; // in-VM path
	repeated string options = 4;
}

message MountAllRequest {
	repeated MountSpec mounts = 1;
}

message MountAllResponse {}

message UnmountRequest {
	string target = 1; // in-VM path
}

message UnmountResponse {}
